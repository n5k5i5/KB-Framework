system:
  name: "KB-OSINT"
  version: "1.0.0"
  language: "en"        # en | tr | ru
  log_level: "info"

modules:
  autoload: true
  verify_signatures: true

reporting:
  default_format: "json"
  output_dir: "./reports"

security:
  module_signing: true
  data_encryption: true

regional:
  mode: international        # international | national
  country_code: ""           # e.g., "tr" when mode=national
  enabled_countries: []      # e.g., ["tr", "us"] when mode=international